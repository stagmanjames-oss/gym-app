<!DOCTYPE html>
<!-- Run this file once in a browser to generate icon PNGs. Right-click each canvas and save as icon-192.png / icon-512.png -->
<html>
<head><title>Generate Icons</title></head>
<body style="background:#222;display:flex;gap:24px;padding:40px;flex-wrap:wrap">

<div>
  <p style="color:#fff;font-family:sans-serif;font-size:12px;margin-bottom:8px">192×192 — right-click → Save image as → icon-192.png</p>
  <canvas id="c192" width="192" height="192"></canvas>
</div>
<div>
  <p style="color:#fff;font-family:sans-serif;font-size:12px;margin-bottom:8px">512×512 — right-click → Save image as → icon-512.png</p>
  <canvas id="c512" width="512" height="512"></canvas>
</div>

<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const r = size * 0.15; // corner radius

  // Background
  ctx.fillStyle = '#0D0F12';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.arcTo(size, 0, size, r, r);
  ctx.lineTo(size, size - r);
  ctx.arcTo(size, size, size - r, size, r);
  ctx.lineTo(r, size);
  ctx.arcTo(0, size, 0, size - r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.fill();

  // Gold accent line (top)
  ctx.fillStyle = '#C9A84C';
  ctx.fillRect(size * 0.12, size * 0.06, size * 0.76, size * 0.04);

  // "G" letterform
  const fontSize = size * 0.52;
  ctx.font = `${fontSize}px 'Georgia', serif`;
  ctx.fillStyle = '#C9A84C';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('G', size / 2, size * 0.54);
}

drawIcon('c192', 192);
drawIcon('c512', 512);
</script>
</body>
</html>
